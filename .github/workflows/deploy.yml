name: Deploy

# Production deploy: runs only on main (i.e. after a PR merges — branch
# protection blocks direct pushes). Re-runs the same `npm run check` as CI,
# then uploads the built web/dist to Netlify with --no-build, so Netlify
# never builds anything itself.
on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://takeoff.345flooring.com
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
      - name: Deploy to Netlify
        run: npx --yes netlify-cli@26 deploy --prod --no-build --dir dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
