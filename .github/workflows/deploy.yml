name: Deploy

# Production deploy: runs only on main (i.e. after a PR merges — branch
# protection blocks direct pushes). Re-runs the same `npm run check` as CI,
# then uploads the built web/dist to Netlify with --no-build, so Netlify
# never builds anything itself.
on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://takeoff.345flooring.com
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
        # Optional team cloud mode (docs/GOOGLE_SETUP.md). These are PUBLIC,
        # non-secret build-time config (a public OAuth client id + the Workspace
        # domain), so they're GitHub *Variables*, not Secrets. This job targets
        # the `production` environment, so `vars.*` resolves that environment's
        # Variables — the same place the Netlify deploy secrets live. Unset =
        # empty = cloud mode stays off and the build is the anonymous local-only
        # app. Vite inlines VITE_* at build time; the deployed dist is this step.
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_HD: ${{ vars.VITE_GOOGLE_HD }}
          VITE_PRICING_FILE_ID: ${{ vars.VITE_PRICING_FILE_ID }}
          VITE_DRIVE_ROOT_FOLDER_ID: ${{ vars.VITE_DRIVE_ROOT_FOLDER_ID }}
      - name: Deploy to Netlify
        # Pinned exact version — bump deliberately; a floating tag would let a
        # compromised release run with the deploy token.
        run: npx --yes netlify-cli@26.1.0 deploy --prod --no-build --dir dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
