name: Deploy

# Production deploy: runs only on main (i.e. after a PR merges — branch
# protection blocks direct pushes). Re-runs the same `npm run check` as CI,
# then uploads the built web/dist to Netlify with --no-build, so Netlify
# never builds anything itself.
on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://takeoff.345flooring.com
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
        # Optional team cloud mode (docs/GOOGLE_SETUP.md). These are PUBLIC,
        # non-secret build-time config (a public OAuth client id + the Workspace
        # domain), so they're GitHub *Variables*, not Secrets. This job targets
        # the `production` environment, so `vars.*` resolves that environment's
        # Variables — the same place the Netlify deploy secrets live. Unset =
        # empty = cloud mode stays off and the build is the anonymous local-only
        # app. Vite inlines VITE_* at build time; the deployed dist is this step.
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          # MATCHED PAIR: VITE_GOOGLE_HD (inlined here at build time) must equal
          # the site's runtime ALLOWED_HD in Netlify — they gate the paid schedule
          # scan reader on client and server respectively. If this Variable is left
          # unset while ALLOWED_HD is set, the client org-gate (isAllowedDomain)
          # silently no-ops and any signed-in account can *reach* the endpoint
          # (the server still 403s non-org accounts — no spend/breach — but the
          # "don't even hit the network" guarantee is lost). Keep the two in sync.
          VITE_GOOGLE_HD: ${{ vars.VITE_GOOGLE_HD }}
          VITE_PRICING_FILE_ID: ${{ vars.VITE_PRICING_FILE_ID }}
          VITE_DRIVE_ROOT_FOLDER_ID: ${{ vars.VITE_DRIVE_ROOT_FOLDER_ID }}
      - name: Deploy to Netlify
        # Pinned exact version — bump deliberately; a floating tag would let a
        # compromised release run with the deploy token.
        # --functions is explicit on purpose: with --no-build --dir dist the CLI
        # won't reliably resolve the functions dir from netlify.toml's base, and
        # the gated schedule-scan function lives outside dist. Naming it here
        # guarantees it ships. (Its GEMINI_API_KEY/ALLOWED_HD are read at runtime
        # from the site's Netlify env, not injected at deploy.)
        run: npx --yes netlify-cli@26.1.0 deploy --prod --no-build --dir dist --functions netlify/functions
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
