name: CI

on:
  pull_request:
  workflow_dispatch:   # allow running the check on demand (e.g. for a branch whose PR was opened by an app token, which doesn't trigger the pull_request event)

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
