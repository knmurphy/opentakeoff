name: CI

on:
  pull_request:
  workflow_dispatch:   # allow running the check on demand (e.g. for a branch whose PR was opened by an app token, which doesn't trigger the pull_request event)

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            mcp/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm ci
        working-directory: mcp
      - run: npm run typecheck
        working-directory: mcp
      - run: npm test
        working-directory: mcp
