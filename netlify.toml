# OpenTakeoff — one-click static deploy.
# The app lives in web/ and builds to web/dist/. The only server code is the
# gated schedule-scan function (web/netlify/functions/); it stays dark unless
# GEMINI_API_KEY is set, so a default deploy is still fully static.
[build]
  base    = "web"
  command = "npm run build"
  publish = "dist"

# Serverless functions live under the build base (web/netlify/functions).
[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# Gated "Import from scanned schedule" — must precede the SPA catch-all, else
# /* swallows it and the POST returns index.html.
[[redirects]]
  from   = "/ai/parse-schedule"
  to     = "/.netlify/functions/parse-schedule"
  status = 200

# Single-page app: serve index.html for any path.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers. This is the fork's PERMANENT, deliberate CSP home — a fork
# decision on its own merits, not a tracking of upstream's file-of-the-week.
# Upstream has flipped between netlify.toml and web/public/_headers more than
# once; we compared both (2026-07-20) and the actual policy content is
# equivalent either way, so we stopped chasing the mechanism. Don't add a
# web/public/_headers file — two CSP headers on one response enforce as their
# intersection, and this block is the only source we maintain.
#
# Baseline (shared shape with upstream): default-src 'self', wasm-unsafe-eval
# for pdf.js's WASM image codec, open connect-src (the BYO-AI base URL and the
# capture/contribute endpoint are user-configured: your own server, localhost,
# any provider — can't be pinned to a fixed allowlist).
#
# First-class fork additions (not a bolt-on divergence — these are load-bearing
# for shipped features and must survive any future re-sync of this block):
#   - script-src/frame-src + accounts.google.com — the GIS SDK + auth iframe
#     Google sign-in / team cloud mode depends on.
#   - style-src + fonts.googleapis.com, font-src + fonts.gstatic.com — the
#     webfonts @import'd by src/styles/tokens.css (upstream's block omits these
#     and silently falls back to system fonts).
#   - Strict-Transport-Security + upgrade-insecure-requests, Permissions-Policy
#     interest-cohort=() (FLoC opt-out) — hardening carried from the fork's
#     original _headers policy.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; worker-src 'self' blob:; connect-src * data: blob:; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000"
